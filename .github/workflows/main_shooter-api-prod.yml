name: Build and Deploy Container (PROD)

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME: shooterregistry
  IMAGE_NAME: shooter-api
  RESOURCE_GROUP: rg-shooter-api-prod
  WEBAPP_NAME: shooter-api-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout source
      # =========================
      - name: Checkout source
        uses: actions/checkout@v4

      # =========================
      # Azure Login (OIDC 유지 - WebApp 배포용)
      # =========================
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F60B7CF6D0BE4708B0D2BBFC1C3248C4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F67D3E9D61994768B3E06A2D6E80F9E2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_49FAB41424B84118BE0DD3245D7BC4E9 }}

      # =========================
      # ACR Login (ADMIN USER 방식)
      # =========================
      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR_NAME.azurecr.io \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      # =========================
      # Build Docker Image
      # =========================
      - name: Build Docker Image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            .

      # =========================
      # Push Docker Image
      # =========================
      - name: Push Docker Image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      # =========================
      # Deploy to Azure Web App
      # =========================
      - name: Update Web App Container
        run: |
          az webapp config container set \
            --name $WEBAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            --docker-registry-server-url https://$ACR_NAME.azurecr.io

      # =========================
      # Restart App
      # =========================
      - name: Restart Web App
        run: |
          az webapp restart \
            --name $WEBAPP_NAME \
            --resource-group $RESOURCE_GROUP