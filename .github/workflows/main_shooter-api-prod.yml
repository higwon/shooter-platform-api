name: Build and Deploy Container (PROD)

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: shooterregistry
  IMAGE_NAME: shooter-api
  RESOURCE_GROUP: rg-shooter-api-prod
  WEBAPP_NAME: shooter-api-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout source
        uses: actions/checkout@v4

      # =========================
      # Azure Login (OIDC)
      # =========================
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure Subscription
        run: |
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # =========================
      # ACR Login
      # =========================
      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      # =========================
      # Docker Build
      # =========================
      - name: Build Docker Image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            .

      # =========================
      # Push Image
      # =========================
      - name: Push Docker Image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      # =========================
      # Deploy Web App Container
      # =========================
      - name: Update Web App Container
        run: |
          az webapp config container set \
            --name $WEBAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            --docker-registry-server-url https://$ACR_NAME.azurecr.io

      # =========================
      # Restart App
      # =========================
      - name: Restart Web App
        run: |
          az webapp restart \
            --name $WEBAPP_NAME \
            --resource-group $RESOURCE_GROUP